<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo da Velha</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .container {
    background: #fff;
    border-radius: 20px;
    padding: 36px 40px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    text-align: center;
    width: 340px;
  }
  h1 { font-size: 1.8rem; color: #2d3748; margin-bottom: 6px; }
  .subtitle { font-size: 0.9rem; color: #718096; margin-bottom: 20px; }

  .scoreboard {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
  }
  .score-box {
    background: #f7fafc;
    border-radius: 12px;
    padding: 10px 18px;
    min-width: 70px;
  }
  .score-box .label { font-size: 0.75rem; color: #a0aec0; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
  .score-box .value { font-size: 1.6rem; font-weight: 700; }
  .score-box.x .value { color: #e53e3e; }
  .score-box.o .value { color: #3182ce; }
  .score-box.tie .value { color: #805ad5; }

  .status {
    font-size: 1rem;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 16px;
    height: 24px;
  }
  .status span.x { color: #e53e3e; }
  .status span.o { color: #3182ce; }

  .board {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }
  .cell {
    background: #f7fafc;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    height: 90px;
    font-size: 2.4rem;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    user-select: none;
  }
  .cell:hover:not(.taken) { background: #ebf4ff; transform: scale(1.03); }
  .cell.x { color: #e53e3e; }
  .cell.o { color: #3182ce; }
  .cell.win { background: #fefcbf; border-color: #ecc94b; }

  .btn {
    background: #4a90e2;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 28px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #2b6cb0; }
</style>
</head>
<body>
<div class="container">
  <h1>🎮 Jogo da Velha</h1>
  <p class="subtitle">Dois jogadores • X começa</p>

  <div class="scoreboard">
    <div class="score-box x"><div class="label">X</div><div class="value" id="scoreX">0</div></div>
    <div class="score-box tie"><div class="label">Empate</div><div class="value" id="scoreTie">0</div></div>
    <div class="score-box o"><div class="label">O</div><div class="value" id="scoreO">0</div></div>
  </div>

  <div class="status" id="status"><span class="x">X</span> começa jogando</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button class="btn" id="restartBtn">Nova Partida</button>
</div>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  let board, cur, over, scores = {X:0, O:0, tie:0};

  const cells = document.querySelectorAll('.cell');
  const statusEl = document.getElementById('status');

  function init() {
    board = Array(9).fill('');
    cur = 'X';
    over = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    setStatus();
  }

  function setStatus(msg) {
    if (msg) { statusEl.innerHTML = msg; return; }
    statusEl.innerHTML = `<span class="${cur.toLowerCase()}">${cur}</span> está jogando`;
  }

  function checkWin(p) {
    return WINS.find(combo => combo.every(i => board[i] === p));
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (over || board[i]) return;
      board[i] = cur;
      cell.textContent = cur;
      cell.classList.add(cur.toLowerCase(), 'taken');

      const win = checkWin(cur);
      if (win) {
        win.forEach(i => cells[i].classList.add('win'));
        scores[cur]++;
        document.getElementById(cur === 'X' ? 'scoreX' : 'scoreO').textContent = scores[cur];
        setStatus(`<span class="${cur.toLowerCase()}">${cur}</span> venceu! 🎉`);
        over = true;
      } else if (board.every(v => v)) {
        scores.tie++;
        document.getElementById('scoreTie').textContent = scores.tie;
        setStatus('Empate! 🤝');
        over = true;
      } else {
        cur = cur === 'X' ? 'O' : 'X';
        setStatus();
      }
    });
  });

  document.getElementById('restartBtn').addEventListener('click', init);
  init();
</script>
</body>
</html>
