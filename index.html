<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Velha</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🎮 Jogo da Velha</h1>
    <p class="subtitle">Dois jogadores • X começa</p>

    <div class="scoreboard">
      <div class="score-box x"><div class="label">X</div><div class="value" id="scoreX">0</div></div>
      <div class="score-box tie"><div class="label">Empate</div><div class="value" id="scoreTie">0</div></div>
      <div class="score-box o"><div class="label">O</div><div class="value" id="scoreO">0</div></div>
    </div>

    <div class="status" id="status"><span class="x">X</span> começa jogando</div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <button class="btn" id="restartBtn">Nova Partida</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
